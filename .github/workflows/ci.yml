name: CI

on:
  push:
    branches: ["main"]

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci
      - run: npx prisma generate
      - run: npm run build

      # Connexion au registre GitHub
      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Build et publication de l'image
      - name: Build & Push
        run: |
          docker build -t ghcr.io/${{ github.repository_owner }}/next-app:latest .
          docker push ghcr.io/${{ github.repository_owner }}/next-app:latest

      # Déploiement automatique sur le VPS
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd app
            docker compose pull
            docker compose up -d



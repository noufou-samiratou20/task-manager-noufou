# ci.yml

name: CI

on:
  push:
    branches: ["main"]

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci
      - run: npx prisma generate
      - run: npm run build
      [19:34, 07/04/2026] Kambire: # Connexion au registre GitHub
      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Image canonique : ghcr.io/<owner>/<nom-du-depot>:latest (visible sous Packages du dépôt)
      # Alias next-app : garde la compatibilité si ton docker-compose sur le VPS utilise encore ce chemin
      - name: Build & Push
        run: |
          docker build \
            -t ghcr.io/${{ github.repository }}:latest \
            -t ghcr.io/${{ github.repository_owner }}/next-app:latest \
            .
          docker push ghcr.io/${{ github.repository }}:latest
          docker push ghcr.io/${{ github.repository_owner }}/next-app:latest

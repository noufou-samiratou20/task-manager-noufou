name: CI

on:
  push:
    branches: [main, master]

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci
      - run: npx prisma generate
      - run: npm run build

      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Push
        run: |
          docker build -t ghcr.io/noufou-samiratou20/task-manager-noufou:latest .
          docker push ghcr.io/noufou-samiratou20/task-manager-noufou:latest